<script>

const motivosFija = ["COMPETENCIA CON MEJOR PRECIO","FALLA MASIVA","FALLECIMIENTO","MALA EXPERIENCIA TÉCNICA","NO ENTREGA INFORMACIÓN","NO HAY FACTIBILIDAD","NO RECONOCE VENTA","OFERTA NO APLICADA","RECLAMO AJUSTE IPC","RECLAMOS FACTURACIÓN","RENOVACIÓN DESCUENTO","SITUACION ECONÓMICA","SUSTITUYE POR PRODUCTO MOVISTAR","TRASLADO","BAJA NO CURSADA","COBROS EN LA BOLETA","LLAMADA CORTA","LLAMADA NO SE ENCUENTRA EN VERINT","LLAMADA SIN ATENCIÓN"];

const motivosMovil = ["CAMBIO A LA COMPETENCIA","CLIENTE CON DEUDA","MAL FUNCIONAMIENTO DEL PRODUCTO","MALA EXPERIENCIA EN LA VENTA / POSTVENTA","NECESITA REDUCIR GASTOS","NO RECONOCE LA VENTA","NO USA EL PRODUCTO","SUSTITUYE POR OTRO SERVICIO","VIAJE AL EXTRANJERO","NO APLICA","BAJA NO CURSADA","COBROS EN LA BOLETA","LLAMADA CORTA","LLAMADA NO SE ENCUENTRA EN VERINT","LLAMADA SIN ATENCIÓN"];

function cargarMotivosBaja(lista){
    motivoRegistrado.innerHTML='<option value="">Selecciona</option>';
    motivoReal.innerHTML='<option value="">Selecciona</option>';
    lista.forEach(m=>{
        motivoRegistrado.add(new Option(m,m));
        motivoReal.add(new Option(m,m));
    });
}

servicio.addEventListener("change",function(){
    if(this.value==="RETENCIONES FIJA"){
        cargarMotivosBaja(motivosFija);
    }else if(this.value==="RETENCIONES MOVIL" || this.value==="CONTIGO"){
        cargarMotivosBaja(motivosMovil);
    }else{
        motivoRegistrado.innerHTML='<option value="">Selecciona</option>';
        motivoReal.innerHTML='<option value="">Selecciona</option>';
    }
});


/* ===============================
   NO VENTA
=================================*/

const nvCliente = ["CLIENTE CRÍTICO / NO DESEA ESCUCHAR OFERTAS","CLIENTE CORTA LLAMADA","YA TIENE LOS PRODUCTOS","NO DESEA NADA CON MOVISTAR","MALA EXPERIENCIA CON LOS SERVICIOS"];
const nvVmo = ["SIN SOLUCIÓN DE AVERÍAS","COBROS ALTOS EN SU SERVICIO ACTUAL","DEMORA EN LAS INSTALACIONES","CAÍDA DE SISTEMA","OFERTA NO ES LO QUE ESPERABA","CLIENTE SUSPENDIDO"];
const nvExp = ["TRANSFERENCIA INCORRECTA A NUESTRA ÁREA","MALA EXPERIENCIA CON LAS ATENCIONES ANTERIORES","INFORMACIÓN INCORRECTA EN ATENCIÓN ANTERIOR","DISCONFORME CON EL TIEMPO DE ESPERA EN TRANSFERENCIAS"];

function cargarNoVenta(lista){
    motivoNoVenta.innerHTML='<option value="">Selecciona</option>';
    lista.forEach(m=>motivoNoVenta.add(new Option(m,m)));
}

function validarNoVenta(){
    const valor = agenteOfrece.value;
    if(valor==="NO" || valor==="SI - SOLO INFORMATIVO"){
        switch(causaRaiz.value){
            case "ASESOR": cargarNoVenta(nvAsesor); break;
            case "CLIENTE": cargarNoVenta(nvCliente); break;
            case "VMO": cargarNoVenta(nvVmo); break;
            case "EXPERIENCIA ANTERIOR": cargarNoVenta(nvExp); break;
            default: motivoNoVenta.innerHTML='<option value="">Selecciona</option>';
        }
    }else{
        motivoNoVenta.innerHTML='<option value="">Selecciona</option>';
    }
}

agenteOfrece.addEventListener("change", validarNoVenta);
causaRaiz.addEventListener("change", validarNoVenta);

const form = document.getElementById("googleForm");
const mensaje = document.getElementById("mensaje");

form.addEventListener("submit", function(){

    const servicioValor = servicio.value;
    const liderValor = document.getElementById("Lider").value;

    setTimeout(()=>{
        form.reset();
        servicio.value = servicioValor;
        document.getElementById("Lider").value = liderValor;
        mensaje.innerText="✅ Registro enviado correctamente";
    },1000);

});

});
</script>
