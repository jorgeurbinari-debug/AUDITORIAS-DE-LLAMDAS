<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario Google</title>
  <!-- Librería para leer bien el CSV de Google -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>


<style>
body{
  font-family: Arial, Helvetica, sans-serif;
  background:#f4f6f8;
  margin:0;
  padding:30px;
}
  

  
  #resumenContenido table {
  width: 100%;
  table-layout: auto;
}

#resumenContenido th,
#resumenContenido td {
  border: 1px solid #ccc;
  padding: 6px;
  white-space: nowrap;
  text-align: left;
}

#resumenContenido th {
  background: #f2f2f2;
  position: sticky;
  top: 0;
}



  
h2{ text-align:center; margin-bottom:25px; }

form{
  max-width:1200px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.grid{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:20px;
}

.campo{ display:flex; flex-direction:column; }

.campo label{
  font-size:13px;
  font-weight:bold;
  margin-bottom:6px;
}

.campo input,
.campo select{
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:14px;
}

.campo input:focus,
.campo select:focus{
  border-color:#007bff;
  outline:none;
  box-shadow:0 0 0 2px rgba(0,123,255,0.2);
}

button{
  margin-top:25px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:6px;
  background:#007bff;
  color:white;
  font-size:16px;
  cursor:pointer;
}
button:hover{ background:#0056b3; }

.error{ border:2px solid red !important; }
.full{ grid-column: span 3; }
</style>
</head>





</html>
