<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario Google</title>

<style>
body{
  font-family: Arial, Helvetica, sans-serif;
  background:#f4f6f8;
  margin:0;
  padding:30px;
}

h2{ text-align:center; margin-bottom:25px; }

form{
  max-width:1200px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.grid{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:20px;
}

.campo{ display:flex; flex-direction:column; }

.campo label{
  font-size:13px;
  font-weight:bold;
  margin-bottom:6px;
}

.campo input,
.campo select,
.campo textarea{
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:14px;
}

.campo input:focus,
.campo select:focus,
.campo textarea:focus{
  border-color:#007bff;
  outline:none;
  box-shadow:0 0 0 2px rgba(0,123,255,0.2);
}

textarea{
  min-height:60px;
  resize:vertical;
}

button{
  margin-top:25px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:6px;
  background:#007bff;
  color:white;
  font-size:16px;
  cursor:pointer;
}
button:hover{ background:#0056b3; }

.mensaje{
  text-align:center;
  margin-top:15px;
  color:green;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>Registro</h2>

<form id="googleForm"
action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSctbWuMZCW2cFyFqoQSs05BYTOqCM-Va6iUdTcvOWWwC2P6dA/formResponse"
method="POST"
target="hidden_iframe">

<iframe name="hidden_iframe" style="display:none;"></iframe>

<div class="grid">

<!-- 🔹 MANTENGO SOLO PARTE INICIAL COMO EJEMPLO (EL RESTO DE TUS CAMPOS SIGUEN IGUAL) -->

<div class="campo">
<label>Servicio</label>
<select id="Servicio" name="entry.1037946129" required>
<option value="">Selecciona</option>
<option value="RETENCIONES FIJA">RETENCIONES FIJA</option>
<option value="RETENCIONES MOVIL">RETENCIONES MOVIL</option>
<option value="CONTIGO">CONTIGO</option>
</select>
</div>

<div class="campo">
<label>Lider *</label>
<select id="Lider" name="entry.531191119" required>
<option value="">Selecciona</option>
<option value="COELLO COLICHON ALEJANDRINA MARTHA">COELLO COLICHON ALEJANDRINA MARTHA</option>
<option value="LLATAS CAICEDO JENERY CHYAREN">LLATAS CAICEDO JENERY CHYAREN</option>
<option value="MAZA PICON SERGIO LUIS">MAZA PICON SERGIO LUIS</option>
<option value="MUNDACA HUALCA VERONICA GUADALUPE">MUNDACA HUALCA VERONICA GUADALUPE</option>
<option value="URBINA RIVERA JORGE DANIEL">URBINA RIVERA JORGE DANIEL</option>
</select>
</div>

<!-- ⚠️ AQUÍ VAN TODOS TUS DEMÁS CAMPOS EXACTAMENTE IGUAL COMO LOS TENÍAS -->

</div>

<button type="submit">Enviar Registro</button>
<div class="mensaje" id="mensaje"></div>

</form>

<script>
document.addEventListener("DOMContentLoaded", function(){

/* ===============================
   MOTIVO DE BAJA
=================================*/
const servicio = document.getElementById("Servicio");
const motivoRegistrado = document.getElementById("motivoRegistrado");
const motivoReal = document.getElementById("motivoReal");

const motivosFija = ["COMPETENCIA CON MEJOR PRECIO","FALLA MASIVA","FALLECIMIENTO","MALA EXPERIENCIA TÉCNICA","NO ENTREGA INFORMACIÓN","NO HAY FACTIBILIDAD","NO RECONOCE VENTA","OFERTA NO APLICADA","RECLAMO AJUSTE IPC","RECLAMOS FACTURACIÓN","RENOVACIÓN DESCUENTO","SITUACION ECONÓMICA","SUSTITUYE POR PRODUCTO MOVISTAR","TRASLADO","BAJA NO CURSADA","COBROS EN LA BOLETA","LLAMADA CORTA","LLAMADA NO SE ENCUENTRA EN VERINT","LLAMADA SIN ATENCIÓN"];

const motivosMovil = ["CAMBIO A LA COMPETENCIA","CLIENTE CON DEUDA","MAL FUNCIONAMIENTO DEL PRODUCTO","MALA EXPERIENCIA EN LA VENTA / POSTVENTA","NECESITA REDUCIR GASTOS","NO RECONOCE LA VENTA","NO USA EL PRODUCTO","SUSTITUYE POR OTRO SERVICIO","VIAJE AL EXTRANJERO","NO APLICA","BAJA NO CURSADA","COBROS EN LA BOLETA","LLAMADA CORTA","LLAMADA NO SE ENCUENTRA EN VERINT","LLAMADA SIN ATENCIÓN"];

function cargarMotivosBaja(lista){
    motivoRegistrado.innerHTML='<option value="">Selecciona</option>';
    motivoReal.innerHTML='<option value="">Selecciona</option>';
    lista.forEach(m=>{
        motivoRegistrado.add(new Option(m,m));
        motivoReal.add(new Option(m,m));
    });
}

servicio.addEventListener("change",function(){
    if(this.value==="RETENCIONES FIJA"){
        cargarMotivosBaja(motivosFija);
    }else if(this.value==="RETENCIONES MOVIL" || this.value==="CONTIGO"){
        cargarMotivosBaja(motivosMovil);
    }else{
        motivoRegistrado.innerHTML='<option value="">Selecciona</option>';
        motivoReal.innerHTML='<option value="">Selecciona</option>';
    }
});


/* ===============================
   NO VENTA
=================================*/
const agenteOfrece = document.getElementById("Agenteofrece");
const causaRaiz = document.getElementById("Cauzaraiz");
const motivoNoVenta = document.getElementById("Noventa");

const nvAsesor = ["ASESOR NO ABORDA","ASESOR SOLO INFORMA","ASESOR NO REBATE OBJECIONES","FALTA DE HABILIDAD BLANDA"];
const nvCliente = ["CLIENTE CRÍTICO / NO DESEA ESCUCHAR OFERTAS","CLIENTE CORTA LLAMADA","YA TIENE LOS PRODUCTOS","NO DESEA NADA CON MOVISTAR","MALA EXPERIENCIA CON LOS SERVICIOS"];
const nvVmo = ["SIN SOLUCIÓN DE AVERÍAS","COBROS ALTOS EN SU SERVICIO ACTUAL","DEMORA EN LAS INSTALACIONES","CAÍDA DE SISTEMA","OFERTA NO ES LO QUE ESPERABA","CLIENTE SUSPENDIDO"];
const nvExp = ["TRANSFERENCIA INCORRECTA A NUESTRA ÁREA","MALA EXPERIENCIA CON LAS ATENCIONES ANTERIORES","INFORMACIÓN INCORRECTA EN ATENCIÓN ANTERIOR","DISCONFORME CON EL TIEMPO DE ESPERA EN TRANSFERENCIAS"];

function cargarNoVenta(lista){
    motivoNoVenta.innerHTML='<option value="">Selecciona</option>';
    lista.forEach(m=>motivoNoVenta.add(new Option(m,m)));
}

function validarNoVenta(){
    const valor = agenteOfrece.value;
    if(valor==="NO" || valor==="SI - SOLO INFORMATIVO"){
        switch(causaRaiz.value){
            case "ASESOR": cargarNoVenta(nvAsesor); break;
            case "CLIENTE": cargarNoVenta(nvCliente); break;
            case "VMO": cargarNoVenta(nvVmo); break;
            case "EXPERIENCIA ANTERIOR": cargarNoVenta(nvExp); break;
            default: motivoNoVenta.innerHTML='<option value="">Selecciona</option>';
        }
    }else{
        motivoNoVenta.innerHTML='<option value="">Selecciona</option>';
    }
}

agenteOfrece.addEventListener("change", validarNoVenta);
causaRaiz.addEventListener("change", validarNoVenta);


/* ===============================
   ENVIO Y LIMPIEZA
=================================*/
const form = document.getElementById("googleForm");
const mensaje = document.getElementById("mensaje");

form.addEventListener("submit", function(){

    const servicioValor = servicio.value;
    const liderValor = document.getElementById("Lider").value;

    setTimeout(()=>{
        form.reset();
        servicio.value = servicioValor;
        document.getElementById("Lider").value = liderValor;
        mensaje.innerText="✅ Registro enviado correctamente";
    },1000);

});

});
</script>

</body>
</html>
