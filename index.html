const nvCliente = ["CLIENTE CRÍTICO / NO DESEA ESCUCHAR OFERTAS","CLIENTE CORTA LLAMADA","YA TIENE LOS PRODUCTOS","NO DESEA NADA CON MOVISTAR","MALA EXPERIENCIA CON LOS SERVICIOS"];
const nvVmo = ["SIN SOLUCIÓN DE AVERÍAS","COBROS ALTOS EN SU SERVICIO ACTUAL","DEMORA EN LAS INSTALACIONES","CAÍDA DE SISTEMA","OFERTA NO ES LO QUE ESPERABA","CLIENTE SUSPENDIDO"];
const nvExp = ["TRANSFERENCIA INCORRECTA A NUESTRA ÁREA","MALA EXPERIENCIA CON LAS ATENCIONES ANTERIORES","INFORMACIÓN INCORRECTA EN ATENCIÓN ANTERIOR","DISCONFORME CON EL TIEMPO DE ESPERA EN TRANSFERENCIAS"];

function cargarNoVenta(lista){
    motivoNoVenta.innerHTML='<option value="">Selecciona</option>';
    lista.forEach(m=>motivoNoVenta.add(new Option(m,m)));
}

function validarNoVenta(){
    if(!agenteOfrece || !causaRaizcross1) return;
    if(agenteOfrece.value==="NO" || agenteOfrece.value==="SI - SOLO INFORMATIVO"){
        switch(causaRaizcross1.value){
            case "ASESOR": cargarNoVenta(nvAsesor); break;
            case "CLIENTE": cargarNoVenta(nvCliente); break;
            case "VMO": cargarNoVenta(nvVmo); break;
            case "EXPERIENCIA ANTERIOR": cargarNoVenta(nvExp); break;
            default: motivoNoVenta.innerHTML='<option value="">Selecciona</option>';
        }
    }else{
        motivoNoVenta.innerHTML='<option value="">Selecciona</option>';
    }
}

agenteOfrece.addEventListener("change", validarNoVenta);
causaRaizcross1.addEventListener("change", validarNoVenta);

=================================*/
const tipoMuestra = document.getElementById("Tipodemuestra");

const camposEPA = ["801462156","775761170","1707404081","1986049857","435072420","1335755996","249344188","1970751650","1722660845","540982508","1574773486"];
const camposEFECTIVIDAD = ["1723677195","229089857","1986049857","435072420","1335755996","1131024963","249344188","1970751650","1722660845","540982508","1574773486"];
const camposCROSS = ["1954737468","2024872077","64049186","932601302","698375446","1271045405","1766526396","1986049857","435072420","1335755996","249344188","1970751650","1722660845","540982508","1574773486"];

function ocultarTodos(){
    const todos = new Set([...camposEPA,...camposEFECTIVIDAD,...camposCROSS]);
    todos.forEach(id=>{
        const campo = document.querySelector(`[name="entry.${id}"]`);
        if(campo){
            campo.closest(".campo").style.display="none";
            campo.required=false;
        }
    });
}

function actualizarCampos(){
    ocultarTodos();
    const seleccionados = Array.from(tipoMuestra.selectedOptions).map(op=>op.value);
    let mostrar = new Set();

    if(seleccionados.includes("EPA")) camposEPA.forEach(c=>mostrar.add(c));
    if(seleccionados.includes("EFECTIVIDAD")) camposEFECTIVIDAD.forEach(c=>mostrar.add(c));
    if(seleccionados.includes("CROSS")) camposCROSS.forEach(c=>mostrar.add(c));

    mostrar.forEach(id=>{
        const campo = document.querySelector(`[name="entry.${id}"]`);
        if(campo){
            campo.closest(".campo").style.display="flex";
            campo.required=true;
        }
    });
}

tipoMuestra.addEventListener("change", actualizarCampos);
ocultarTodos();
actualizarCampos();

=================================*/
const seguimiento = document.getElementById("Seguimiento");
const campoInicioAplazamiento = document.getElementById("campo_inicio_aplazamiento");
const campoFinAplazamiento = document.getElementById("campo_fin_aplazamiento");

function actualizarAplazamiento(){
    const inputInicio = campoInicioAplazamiento.querySelector("input");
    const inputFin = campoFinAplazamiento.querySelector("input");

    if(seguimiento.value==="APLAZAMIENTO"){
        campoInicioAplazamiento.style.display="flex";
        campoFinAplazamiento.style.display="flex";
        inputInicio.required=true;
        inputFin.required=true;
    }else{
        campoInicioAplazamiento.style.display="none";
        campoFinAplazamiento.style.display="none";
        inputInicio.required=false;
        inputFin.required=false;
        inputInicio.value="";
        inputFin.value="";
    }
}

seguimiento.addEventListener("change", actualizarAplazamiento);
actualizarAplazamiento();

const form = document.getElementById("googleForm");
const mensaje = document.getElementById("mensaje");

form.addEventListener("submit", async function(e){
    e.preventDefault();
    mensaje.innerText = "⏳ Enviando registro...";
    const seleccionados = Array.from(tipoMuestra.selectedOptions).map(op => op.value);
    if(seleccionados.length === 0){
        mensaje.innerText = "❌ Debes seleccionar al menos un Tipo de Muestra";        return;
    }
    try {
        for (let tipo of seleccionados) {
            // Creamos un nuevo FormData por cada tipo
            const formData = new FormData(form);
            // Eliminamos los múltiples valores
            formData.delete("entry.1613585774");
            // Agregamos solo uno
            formData.append("entry.1613585774", tipo);
            await fetch("https://docs.google.com/forms/d/e/1FAIpQLSctbWuMZCW2cFyFqoQSs05BYTOqCM-Va6iUdTcvOWWwC2P6dA/formResponse", {
                method: "POST",
                mode: "no-cors",
                body: formData
            });
        }
        mensaje.innerText = "✅ Registro(s) enviado(s) correctamente";
        form.reset();
        actualizarCampos();
        actualizarAplazamiento();
      actualizarLider("");
      representanteSelect.innerHTML = '<option value="">Selecciona Representante</option>';
    } catch (error) {
        mensaje.innerText = "❌ Error al enviar el registro";
    }
});

});
