<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario Google - Auditorías</title>

<style>
    /* CSS Unificado y Limpio */
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #ece9e6, #ffffff);
        margin: 0;
        padding: 30px;
    }

    h2 { text-align: center; color: #333; margin-bottom: 25px; }

    form {
        max-width: 1200px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        border: 1px solid #ddd;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
    }

    .campo { display: flex; flex-direction: column; }

    .campo label {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 6px;
        color: #444;
    }

    .campo input, .campo select, .campo textarea {
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #bbb;
        font-size: 14px;
        width: 100%;
        box-sizing: border-box;
    }

    input:focus, select:focus, textarea:focus {
        border-color: #0066ff;
        box-shadow: 0 0 6px rgba(0,102,255,0.4);
        outline: none;
    }

    textarea { min-height: 80px; resize: vertical; }

    button {
        margin-top: 25px;
        padding: 15px;
        width: 100%;
        border: none;
        border-radius: 6px;
        background: linear-gradient(45deg, #0066ff, #0044cc);
        color: white;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.1s;
    }

    button:active { transform: scale(0.98); }

    .mensaje {
        text-align: center;
        margin-top: 15px;
        color: #28a745;
        font-weight: bold;
        min-height: 20px;
    }

    @media (max-width: 1024px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>

<body>

<h2>REGISTRO DE AUDITORIAS RETENCIONES</h2>

<form id="googleForm" 
      action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSctbWuMZCW2cFyFqoQSs05BYTOqCM-Va6iUdTcvOWWwC2P6dA/formResponse" 
      method="POST" 
      target="hidden_iframe">

    <div class="grid">
        <div class="campo">
            <label>Servicio</label>
            <select id="Servicio" name="entry.1037946129" required>
                <option value="">Selecciona</option>
                <option value="RETENCIONES FIJA">RETENCIONES FIJA</option>
                <option value="RETENCIONES MOVIL">RETENCIONES MOVIL</option>
                <option value="CONTIGO">CONTIGO</option>
            </select>
        </div>

        <div class="campo">
            <label>Lider *</label>
            <select id="Lider" name="entry.531191119" required>
                <option value="">Selecciona</option>
                <option value="COELLO COLICHON ALEJANDRINA MARTHA">COELLO COLICHON ALEJANDRINA MARTHA</option>
                <option value="LLATAS CAICEDO JENERY CHYAREN">LLATAS CAICEDO JENERY CHYAREN</option>
                <option value="MAZA PICON SERGIO LUIS">MAZA PICON SERGIO LUIS</option>
                <option value="MUNDACA HUALCA VERONICA GUADALUPE">MUNDACA HUALCA VERONICA GUADALUPE</option>
                <option value="URBINA RIVERA JORGE DANIEL">URBINA RIVERA JORGE DANIEL</option>
            </select>
        </div>

        <div class="campo">
            <label>Representante</label>
            <select name="entry.480035690" required>
                <option value="">Selecciona Representante</option>
                <option value="AGUILAR VARGAS URSULA NOEMI">AGUILAR VARGAS URSULA NOEMI</option>
                <option value="ALTAMIRANO MEGO MARIO SERGIO">ALTAMIRANO MEGO MARIO SERGIO</option>
                <option value="BECERRA GOMEZ PACO JHORDAN">BECERRA GOMEZ PACO JHORDAN</option>
                <option value="ZAPATA BENAVIDES DELIA LISSETH">ZAPATA BENAVIDES DELIA LISSETH</option>
                </select>
        </div>

        <div class="campo">
            <label>Suscripcion</label>
            <input name="entry.724552463" required placeholder="Número de suscripción">
        </div>

        <div class="campo">
            <label>Fecha</label>
            <input type="date" name="entry.568992954" required>
        </div>

        <div class="campo">
            <label>Caso</label>
            <input name="entry.1041345748" required>
        </div>

        <div class="campo">
            <label>Id Conmutador</label>
            <input name="entry.1553593605" required>
        </div>

        <div class="campo">
            <label>Id Conmutador2</label>
            <input name="entry.1144665915" required>
        </div>

        <div class="campo">
            <label>Tipologia</label>
            <select id="Tipologia" name="entry.778134447" required>
                <option value="">Selecciona</option>
                <option value="SOLICTUD DE BAJA">SOLICTUD DE BAJA</option>
                <option value="RECLAMO">RECLAMO</option>
                <option value="CONSULTA">CONSULTA</option>
                <option value="INCIDENCIA">INCIDENCIA</option>
            </select>
        </div>

        <div class="campo">
            <label>Motivo de Baja Registrado</label>
            <select id="motivoRegistrado" name="entry.462623756" required>
                <option value="">Selecciona Servicio primero</option>
            </select>
        </div>

        <div class="campo">
            <label>Motivo de Baja Real</label>
            <select id="motivoReal" name="entry.1173442708" required>
                <option value="">Selecciona Servicio primero</option>
            </select>
        </div>

        <div class="campo">
            <label>Resultado</label>
            <select id="Resultado" name="entry.459989845" required>
                <option value="">Selecciona</option>
                <option value="CONTENIDO">CONTENIDO</option>
                <option value="NO CONTENIDO">NO CONTENIDO</option>
                <option value="NO APLICA">NO APLICA</option>
            </select>
        </div>

        <div class="campo">
            <label>Tipo de Muestra</label>
            <select id="Tipodemuestra" name="entry.1613585774" required>
                <option value="">Selecciona</option>
                <option value="EPA">EPA</option>
                <option value="EFECTIVIDAD">EFECTIVIDAD</option>
                <option value="CROSS">CROSS</option>
            </select>
        </div>

        <div class="campo" data-seccion="EPA">
            <label>Causa Raiz</label>
            <select id="Cauzaraiz" name="entry.801462156">
                <option value="">Selecciona</option>
                <option value="ASESOR">ASESOR</option>
                <option value="CLIENTE">CLIENTE</option>
                <option value="VMO">VMO</option>
                <option value="EXPERIENCIA ANTERIOR">EXPERIENCIA ANTERIOR</option>
            </select>
        </div>

        <div class="campo" data-seccion="EPA">
            <label>Motivo de Causa Raiz</label>
            <select id="Motivocausaraiz" name="entry.775761170">
                <option value="">Selecciona Causa Raiz primero</option>
            </select>
        </div>

        <div class="campo" data-seccion="EPA">
            <label>Aplica Speech EPA</label>
            <select id="SpeechEpa" name="entry.1707404081">
                <option value="">Selecciona</option>
                <option value="BRINDA CORRECTAMENTE">BRINDA CORRECTAMENTE</option>
                <option value="NO BRINDA SPEECH">NO BRINDA SPEECH</option>
                <option value="BRINDA DE MANERA INCORRECTA/INCOMPLETA">BRINDA DE MANERA INCORRECTA/INCOMPLETA</option>
                <option value="NO APLICA">NO APLICA</option>
            </select>
        </div>

        <div class="campo" data-seccion="EFECTIVIDAD">
            <label>Ofrece Escalonado</label>
            <select id="Escalonado" name="entry.1723677195">
                <option value="">Selecciona</option>
                <option value="SI">SI</option>
                <option value="NO">NO</option>
                <option value="NO APLICA">NO APLICA</option>
            </select>
        </div>

        <div class="campo" data-seccion="EFECTIVIDAD">
            <label>Motivo de No Contencion</label>
            <select id="Nocontencion" name="entry.229089857">
                <option value="">Selecciona</option>
                <option value="BAJA POR ALTA">BAJA POR ALTA</option>
                <option value="FALLAS TECNICAS">FALLAS TECNICAS</option>
                <option value="RESPONSABILIDAD ASESOR">RESPONSABILIDAD ASESOR</option>
            </select>
        </div>

        <div class="campo" data-seccion="EFECTIVIDAD">
            <label>Descripción de No Contención</label>
            <textarea id="descripcionNoContencion" name="entry.1131024963"></textarea>
        </div>

        <div class="campo" data-seccion="CROSS">
            <label>Hubo Solucion al Req.</label>
            <select name="entry.1954737468">
                <option value="">Selecciona</option>
                <option value="SI">SI</option>
                <option value="NO">NO</option>
            </select>
        </div>

        <div class="campo" data-seccion="CROSS">
            <label>Agente Ofrece</label>
            <select id="Agenteofrece" name="entry.64049186">
                <option value="">Selecciona</option>
                <option value="SI - CON INTENCION">SI - CON INTENCION</option>
                <option value="SI - SOLO INFORMATIVO">SI - SOLO INFORMATIVO</option>
                <option value="NO">NO</option>
            </select>
        </div>

        <div class="campo" data-seccion="CROSS">
            <label>Motivo de no venta</label>
            <select id="Noventa" name="entry.932601302">
                <option value="">Selecciona</option>
            </select>
        </div>

        <div class="campo">
            <label>Oportunidad de Mejora</label>
            <select name="entry.1986049857" required>
                <option value="">Selecciona</option>
                <option value="EMPATÍA">EMPATÍA</option>
                <option value="NEGOCIACIÓN">NEGOCIACIÓN</option>
                <option value="CUMPLIMIENTO DE PROCESO">CUMPLIMIENTO DE PROCESO</option>
            </select>
        </div>

        <div class="campo">
            <label>Accion de Seguimiento</label>
            <select id="Seguimiento" name="entry.1722660845" required>
                <option value="">Selecciona</option>
                <option value="FEEDBACK DE MEJORA">FEEDBACK DE MEJORA</option>
                <option value="APLAZAMIENTO">APLAZAMIENTO</option>
            </select>
        </div>

        <div class="campo" id="div_inicio" style="display:none;">
            <label>Inicio de Aplazamiento</label>
            <input type="date" name="entry.540982508" id="inicio_aplazamiento">
        </div>

        <div class="campo" id="div_fin" style="display:none;">
            <label>Fin de Aplazamiento</label>
            <input type="date" name="entry.1574773486" id="fin_aplazamiento">
        </div>

        <div class="campo" style="grid-column: span 2;">
            <label>Resumen de la Llamada</label>
            <textarea name="entry.1970751650" required></textarea>
        </div>
    </div>

    <button type="submit" id="btnEnviar">Enviar Registro</button>
    <div class="mensaje" id="mensaje"></div>

</form>

<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(sent){showSuccess();}"></iframe>

<script>
let sent = false;

document.addEventListener("DOMContentLoaded", function() {

    const form = document.getElementById("googleForm");
    const mensaje = document.getElementById("mensaje");

    // 1. LÓGICA DE MOTIVOS DE BAJA (FIJA / MOVIL)
    const servicio = document.getElementById("Servicio");
    const motReg = document.getElementById("motivoRegistrado");
    const motReal = document.getElementById("motivoReal");

    const motivosFija = ["COMPETENCIA CON MEJOR PRECIO","FALLA MASIVA","FALLECIMIENTO","MALA EXPERIENCIA TÉCNICA","TRASLADO","BAJA NO CURSADA"];
    const motivosMovil = ["CAMBIO A LA COMPETENCIA","CLIENTE CON DEUDA","NECESITA REDUCIR GASTOS","VIAJE AL EXTRANJERO"];

    servicio.addEventListener("change", function() {
        let lista = this.value === "RETENCIONES FIJA" ? motivosFija : motivosMovil;
        [motReg, motReal].forEach(sel => {
            sel.innerHTML = '<option value="">Selecciona</option>';
            lista.forEach(m => sel.add(new Option(m, m)));
        });
    });

    // 2. LÓGICA CAUSA RAIZ EPA
    const causaRaiz = document.getElementById("Cauzaraiz");
    const motCausa = document.getElementById("Motivocausaraiz");

    const motivos = {
        "ASESOR": ["COMPORTAMIENTO / EVASIÓN","HABILIDAD / MANEJO","CONOCIMIENTO"],
        "CLIENTE": ["CUELGA SIN FINALIZAR","NO GESTIONABLE"],
        "VMO": ["CAÍDA DE SISTEMA","LLAMADA SIN AUDIO"]
    };

    causaRaiz.addEventListener("change", function() {
        motCausa.innerHTML = '<option value="">Selecciona</option>';
        if(motivos[this.value]) {
            motivos[this.value].forEach(m => motCausa.add(new Option(m, m)));
        }
    });

    // 3. LÓGICA TIPO DE MUESTRA (MOSTRAR/OCULTAR)
    const tipoMuestra = document.getElementById("Tipodemuestra");
    const camposDinamicos = document.querySelectorAll('[data-seccion]');

    tipoMuestra.addEventListener("change", function() {
        const seleccion = this.value;
        camposDinamicos.forEach(div => {
            const inputs = div.querySelectorAll('input, select, textarea');
            if(div.getAttribute('data-seccion') === seleccion) {
                div.style.display = "flex";
                inputs.forEach(i => i.required = true);
            } else {
                div.style.display = "none";
                inputs.forEach(i => { i.required = false; i.value = ""; });
            }
        });
    });

    // 4. LÓGICA APLAZAMIENTO
    const seguimiento = document.getElementById("Seguimiento");
    const dInicio = document.getElementById("div_inicio");
    const dFin = document.getElementById("div_fin");

    seguimiento.addEventListener("change", function() {
        const esAplazamiento = this.value === "APLAZAMIENTO";
        dInicio.style.display = dFin.style.display = esAplazamiento ? "flex" : "none";
        dInicio.querySelector('input').required = dFin.querySelector('input').required = esAplazamiento;
    });

    // 5. ENVÍO DEL FORMULARIO
    form.addEventListener("submit", function() {
        sent = true;
        mensaje.innerText = "⏳ Enviando datos...";
        document.getElementById("btnEnviar").disabled = true;
    });
});

function showSuccess() {
    const mensaje = document.getElementById("mensaje");
    mensaje.innerText = "✅ Registro guardado en Google Sheets correctamente";
    document.getElementById("googleForm").reset();
    document.getElementById("btnEnviar").disabled = false;
    
    // Resetear visibilidad
    setTimeout(() => { 
        mensaje.innerText = ""; 
        location.reload(); // Recarga para limpiar estados de validación
    }, 3000);
}
</script>

</body>
</html>
